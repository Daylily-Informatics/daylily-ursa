name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install ruff
      - name: ruff check
        run: ruff check .
      - name: ruff format check
        run: ruff format --check .

  security:
    name: Security (bandit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install bandit
      - name: bandit scan
        run: bandit -r daylily_ursa/ -x tests/ -ll -ii

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: [lint, security]
    defaults:
      run:
        shell: bash -l {0}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # setuptools_scm needs tags

      - uses: conda-incubator/setup-miniconda@v3
        with:
          environment-file: config/ursa_env.yaml
          activate-environment: URSA
          miniforge-version: latest

      - name: Install package
        run: pip install -e ".[dev]"

      - name: Run tests
        run: python -m pytest tests/ --tb=short -q