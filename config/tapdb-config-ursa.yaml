meta:
  config_version: 3
  client_id: local
  database_name: ursa
  owner_repo_name: ursa
  domain_registry_path: ~/.config/tapdb/domain_code_registry.json
  prefix_ownership_registry_path: ~/.config/tapdb/prefix_ownership_registry.json
  # Explicit env contract for TapDB/Meridian subprocesses:
  # MERIDIAN_DOMAIN_CODE=Z
  # TAPDB_OWNER_REPO=ursa
environments:
  dev:
    engine_type: local
    host: localhost
    port: '5588'
    ui_port: '8918'
    database: tapdb_ursa_dev
    audit_log_euid_prefix: RGX
    support_email: support@lsmc.bio
    cognito_user_pool_id: ''
  prod:
    engine_type: aurora
    host: ursa.cluster-REPLACE.us-west-2.rds.amazonaws.com
    port: '5432'
    user: tapdb_admin
    password: ''
    database: tapdb_ursa_prod
    audit_log_euid_prefix: RGX
    support_email: support@lsmc.bio
    cognito_user_pool_id: ''
    region: us-west-2
    cluster_identifier: ursa
    iam_auth: 'true'
    ssl: 'true'
